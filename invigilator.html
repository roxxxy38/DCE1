<html><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="https://oocsi.id.tue.nl/assets/css/pico.indigo.min.css">
  <script type="text/javascript" src="https://oocsi.id.tue.nl/assets/js/p5.min.js"></script>
  <script type="text/javascript" src="https://oocsi.id.tue.nl/assets/js/p5.sound.min.js"></script>
  <script type="text/javascript" src="https://oocsi.id.tue.nl/assets/js/oocsi-web.js"></script>
  <script type="text/javascript" src="https://oocsi.id.tue.nl/assets/js/things/oocsi-things.min.js"></script>
</head>
<body>
    <div id="header"></div>
    <div id="canvasContainer"></div>
    <script>
  var OOCSI = (function() {

  var wsUri = "ws://localhost/ws";
  var username;
  var handlers = {};
  var responders = {};
  var calls = {};
  var websocket;
  var logger = internalLog;
  var error = internalError;

  function init() {
    logger("CONNECTING to "  + wsUri);
    websocket = new WebSocket(wsUri);
    websocket.onopen = onOpen;
    websocket.onclose = onClose;
    websocket.onmessage = onMessage;
    websocket.onerror = onError;
  }

  function onOpen(evt) {
    if(websocket.readyState === WebSocket.OPEN) {
      submit(username);
    }  
    logger("CONNECTED");
  }

  function onClose(evt) {
    logger("DISCONNECTED");
  }

  function onMessage(evt) {
    if(evt.data !== 'ping') {
      try {
        var e = JSON.parse(evt.data);
        if(e.data.hasOwnProperty('_MESSAGE_ID') && calls.hasOwnProperty(e.data['_MESSAGE_ID'])) {
          var c = calls[e.data['_MESSAGE_ID']];

          if((+new Date) < c.expiration) {
            delete e.data['_MESSAGE_ID'];
            c.fn(e.data);
          }

          delete calls[e.data['_MESSAGE_ID']];
        } else if(handlers[e.recipient] !== undefined) {
          handlers[e.recipient].forEach((fn) => {fn(e)});
        } else {
          logger('no handler for event: ' + evt.data);
        }
      } catch(e) {
        logger('ERROR: parse exception for event data ' + evt.data);
      }
      logger('RESPONSE: ' + evt.data);
    } else if(evt.data.length > 0) {
      websocket.send(".");
    }
  }

  function onError(evt) {
    error();
    logger('ERROR: ' + evt);
  }

  function waitForSocket(fn) {
    if(!websocket || websocket.readyState === WebSocket.CONNECTING) {
      setTimeout(function() { waitForSocket(fn) }, 200);
    } else {
      fn();
    }
  } 

  function submit(message) {
    if(websocket && websocket.send(message)) {
      logger("SENT: " + message); 
    }
  }

  function internalClose() {
    websocket && websocket.close();
  }

  function internalLog(message) {
    // do nothing by default
  }

  function internalError() {
    // do nothing by default
  }

  function internalConnected() {
    return websocket.readyState === WebSocket.OPEN;
  }

  function internalSend(client, data) {
    internalConnected() && submit('sendjson ' + client + ' '+ JSON.stringify(data));
  } 

  function internalCall(call, data, timeout, fn) {
    if(internalConnected()) {
      var uuid = guid();
      calls[uuid] = {expiration: (+new Date) + timeout, fn: fn};
      data['_MESSAGE_ID'] = uuid;
      data['_MESSAGE_HANDLE'] = call;
      submit('sendjson ' + call + ' '+ JSON.stringify(data));
    }
  } 

  function internalRegister(call, fn) {
    if(internalConnected()) {
      responders[call] = {fn: fn};
      internalSubscribe(call, function(e) {
        var response = {'_MESSAGE_ID': e.data['_MESSAGE_ID']};
        fn(e.data, response);
        internalSend(e.sender, response);
      });
    }
  }

  function internalSubscribe(channel, fn) {
    if(internalConnected()) {
      submit('subscribe ' + channel);
      if(handlers[channel] === undefined) {
        handlers[channel] = [];
      }
      handlers[channel].push(fn);
    } 
  } 

  function internalUnsubscribe(channel) {
    if(internalConnected()) {
      submit('unsubscribe ' + channel);
      handlers[channel] = [];
    }
  }

  function internalReconnect() {
    if(!internalConnected() && websocket.readyState !== WebSocket.CONNECTING) {
      logger("RECONNECTING");
      init();
      // reconnect subscriptions
      waitForSocket(function() {
        for (ch in handlers) {
          submit('subscribe ' + ch);
        }
      });
    }
  }

  function guid() {
    function s4() {
      return Math.floor((1 + Math.random()) * 0x10000).toString(16).substring(1);
    }
      return s4() + s4() + '-' + s4() + '-' + s4() + '-' + s4() + '-' + s4() + s4() + s4();
  }

  return {
    connect: function(server, clientName, fn) {
      wsUri = server;
      username = clientName && clientName.length > 0 ? clientName : "webclient_" + +(new Date());
      handlers[username] = [fn];
      init();
      setInterval(internalReconnect, 1000);
    },
    send: function(recipient, data) {
      waitForSocket(function() {
        internalSend(recipient, data);
      });
    },
    call: function(call, data, timeout, fn) {
      waitForSocket(function() {
        internalCall(call, data, timeout, fn);
      });
    },
    register: function(call, fn) {
      waitForSocket(function() {
        internalRegister(call, fn);
      });
    },
    subscribe: function(channel, fn) {
      waitForSocket(function() {
        internalSubscribe(channel, fn);
      });
    },
    unsubscribe: function(channel) {
      waitForSocket(function() {
        internalUnsubscribe(channel);
      });
    },
    variable: function(channel, name, throttle = 500) {
      var listeners = [];
      var value;
      var lastUpdate = 0;

      function notify(newValue) {
        // notify all subscribers of a value update (even if value is same)
        listeners.forEach(function(listener) { listener(newValue); });
      }

      function accessor(newValue, broadcast = true) {
        // without arguments, we just return the current value
        if (arguments.length === 0) { return value; }

        // only update if timeout has passed
        if(lastUpdate + throttle > Date.now()) { return; }
        lastUpdate = Date.now();

        // remember whether changed, then update local value
        let changed = newValue !== value;
        value = newValue;

        // notify internal subscribers, regardless of change or not
        notify(value);

        // only update if new value is different
        if(changed && broadcast) {
          // send new value to OOCSI
          let data = {}
          data[name] = value
          internalSend(channel, data);
        }

        return value;
      }

      // allow subscribers to changes in the value
      accessor.subscribe = function(listener) { listeners.push(listener); };

      // subscribe to OOCSI for getting external updates on value
      this.subscribe(channel, function(e) { if(e.data.hasOwnProperty(name)) { accessor(e.data[name], false) } });

      return accessor;
    },
    isConnected: function() {
      return internalConnected();
    },
    handle: function() {
      return username;
    },
    close: function() {
      waitForSocket(function() {
        internalClose();
      });
    },
    handlers: function() {
      return handlers;
    },
    logger: function(fn) {
      logger = fn;
    },
    error: function (fn) {
      error = fn;
    },
    heyOOCSI: function(name) {
      var device_name = name || username;
      var data = {}
      data[device_name] = {}
      data[device_name]['properties'] = {
        device_id: username
      }
      data[device_name]['location'] = {}
      data[device_name]['components'] = {}
      var components = data[device_name]['components']
      logger(`Added heyOOCSI device ${device_name}`)

      return {
            add_property: function(property, propertyValue) {
           data[device_name]['properties'][property] = propertyValue;
        },
        add_location: function(location, latitude, longitude) {
           data[device_name]['properties'][location] = [latitude, longitude];
        },
        add_sensor_brick: function(sensor_name, sensor_channel, sensor_type, sensor_unit, sensor_default, icon) {
           components[sensor_name] = {}
           components[sensor_name]['channel_name'] = sensor_channel
           components[sensor_name]['type'] = 'sensor'
           components[sensor_name]['sensor_type'] = sensor_type
           components[sensor_name]['unit'] = sensor_unit
           components[sensor_name]['value'] = sensor_default
           components[sensor_name]['icon'] = icon
           logger(`Added ${sensor_name} to the components list for device ${device_name}.`)
        },
        add_number_brick: function(number_name, number_channel, number_min_max, number_unit, number_default, icon) {
           components[number_name] = {}
           components[number_name]['channel_name'] = number_channel
           components[number_name]['type'] = 'number'
           components[number_name]['min_max'] = number_min_max
           components[number_name]['unit'] = number_unit
           components[number_name]['value'] = number_default
           components[number_name]['icon'] = icon
           logger(`Added ${number_name} to the components list for device ${device_name}.`)
        },
        add_binary_sensor_brick: function(sensor_name, sensor_channel, sensor_type, sensor_default, icon) {
           components[sensor_name] = {}
           components[sensor_name]['channel_name'] = sensor_channel
           components[sensor_name]['type'] = 'binary_sensor'
           components[sensor_name]['sensor_type'] = sensor_type
           components[sensor_name]['state'] = sensor_default
           components[sensor_name]['icon'] = icon
           logger(`Added ${sensor_name} to the components list for device ${device_name}.`)
        },
        add_switch_brick: function(switch_name, switch_channel, switch_type, switch_default, icon) {
           components[switch_name] = {}
           components[switch_name]['channel_name'] = switch_channel
           components[switch_name]['type'] = 'switch'
           components[switch_name]['sensor_type'] = switch_type
           components[switch_name]['state'] = switch_default
           components[switch_name]['icon'] = icon
           logger(`Added ${switch_name} to the components list for device ${device_name}.`)
        },
        add_light_brick: function(light_name, light_channel, led_type, spectrum, mired_min_max, light_default_state, light_default_brightness, icon) {
           components[light_name] = {}
           components[light_name]['channel_name'] = light_channel
           components[light_name]['type'] = 'light'
           components[light_name]['ledType'] = led_type
           components[light_name]['spectrum'] = spectrum
           components[light_name]['min_max'] = mired_min_max
           components[light_name]['state'] = light_default_state
           components[light_name]['brightness'] = light_default_brightness
           components[light_name]['icon'] = icon
           logger(`Added ${light_name} to the components list for device ${device_name}.`)
        },
        submit: function() {
          OOCSI.send('heyOOCSI!', data)
        },
        sayHi: function() {
          OOCSI.send('heyOOCSI!', data)
        }
      };
    }
  };

})();
    </script>

<script type="text/javascript">

  // --- OOCSI Configuration ---
  oocsiThingsConfig = { teamspace: "Team 12" };
  OOCSI.connect('wss://oocsi.id.tue.nl/ws', 'tea12_oocsi_df');
  let latestMessage = null;

  OOCSI.subscribe('TEAM12_GYRO', function(msg) {
     latestMessage = msg.data;
     console.log(latestMessage);
  });


  let volume;
  let rectX, rectY; 
  let strikes = 0; 
  let maxStrikes = 3;
  let threshold = 0.03; 

  // Timer variables (Set to 60 for 1 minute)
  let mainTimer = 1 * 60; 
  let timeIsUp = false;

  // Danger Zone variables
  let inDangerZone = false;
  let dangerTimer = 0;
  let dangerDuration = 5000; 
  let strikeCooldown = 0; 

  let isDead = false; 
  let mic;

  // Eye variables
  let eyeSize = 100;
  let pupilSize = 30;
  let eyeDistance = 120;
  let movementSpeed = 0.01;
  let movementRange = 25;

  function thing() {
    oocsiThings.register('Voluma 📣', 'voluma', [], ['volume']);
    volume = oocsiThings.data('volume');
  }

  function setup() {
    let canvas = createCanvas(windowWidth, windowHeight);
    canvas.parent('canvasContainer');
    mic = new p5.AudioIn();
    mic.start();
    rectX = width / 2;
    rectY = height / 2;
  }

  function draw() {
    
    // 1. Check Game Over
    if (isDead) {
      drawGameOver();
      return; 
    }

    // 2. Manage Global Timer
    if (frameCount % 60 == 0 && mainTimer > 0) {
      mainTimer--;
    }
    if (mainTimer <= 0) {
      timeIsUp = true;
    }

    // --- THE BIG CHANGE: If time is up, clear everything else ---
    if (timeIsUp) {
      background(10, 15, 25); // Fill background to "erase" everything
      drawShakingBell(width / 2, height / 2 - 50); // Center the bell
      
      // Show only the finish text
      textAlign(CENTER, CENTER);
      fill(255, 215, 0);
      textSize(60);
      text("SESSION FINISHED!", width/2, height/2 + 100);
      return; // STOP DRAWING EVERYTHING ELSE
    }

    // --- Everything below only runs if time is NOT up ---

    background(inDangerZone ? color(40, 35, 10) : color(10, 15, 25)); 

    let vol = mic.getLevel();
    oocsiThings.activity();

    // In draw(), replace the existing danger zone + eyeState block with:

if (vol > threshold && millis() - strikeCooldown > 1000) {
  if (!inDangerZone) {
    inDangerZone = true;
    dangerTimer = millis();
    strikeCooldown = millis();
  } else {
    strikes++;
    inDangerZone = false;
    strikeCooldown = millis();
    if (strikes >= maxStrikes) isDead = true;
  }
}

// OOCSI: danger_level 1 triggers danger zone
if (latestMessage && latestMessage.danger_level >= 1) {
  if (!inDangerZone) {
    inDangerZone = true;
    dangerTimer = millis();
  } else {
    strikes++;
    inDangerZone = false;
    if (strikes >= maxStrikes) isDead = true;
  }
  latestMessage = null; // consume the message so it doesn't keep triggering
}

// End danger zone after 5 seconds
if (inDangerZone && millis() - dangerTimer > dangerDuration) {
  inDangerZone = false;
}

let eyeState = "normal";
if (inDangerZone) eyeState = "angry";
if (vol > threshold) eyeState = "angry";
    drawEyes(rectX, rectY, eyeSize, pupilSize, eyeState);
    drawSoundBar(rectX, rectY + 140, vol);

    drawUI(vol);

    if (typeof volume === 'function') {
      volume(constrain(vol * 30, 0, 1));
    }
  }

  function drawShakingBell(x, y) {
    push();
    let shakeX = random(-8, 8); // Extra shaking
    let shakeY = random(-8, 8);
    translate(x + shakeX, y + shakeY);
    
    fill(255, 215, 0); 
    stroke(184, 134, 11);
    strokeWeight(4);
    
    beginShape();
    vertex(-50, 80);
    bezierVertex(-50, 0, -40, -50, 0, -50);
    bezierVertex(40, -50, 50, 0, 50, 80);
    endShape(CLOSE);
    
    rectMode(CENTER);
    rect(0, 80, 120, 15, 5);
    
    fill(100);
    ellipse(0, 95, 25, 25);
    pop();
  }

  function drawUI(vol) {
    textAlign(LEFT, TOP);
    fill(255);
    textSize(24);
    text("LIVES: ", 20, 20);
    let lifeIcons = "";
    for(let i = 0; i < (maxStrikes - strikes); i++) lifeIcons += "❤️ ";
    for(let i = 0; i < strikes; i++) lifeIcons += "💀 ";
    textSize(32);
    text(lifeIcons, 20, 50);

    textAlign(RIGHT, TOP);
    let mins = floor(mainTimer / 60);
    let secs = mainTimer % 60;
    fill(255);
    text(nf(mins, 2) + ":" + nf(secs, 2), width - 20, 20);

    if (inDangerZone) {
      fill(255, 200, 0);
      textAlign(CENTER);
      textSize(40);
      let timeLeft = ceil((dangerDuration - (millis() - dangerTimer)) / 1000);
      text("DANGER ZONE: " + timeLeft + "s", width/2, height - 100);
    }
  }

  function drawEyes(x, y, eSize, pSize, state) {
    let offsetX = sin(frameCount * movementSpeed) * movementRange;
    push();
    noStroke();
    if (state === "angry") fill(255, 150, 150);
    else if (state === "suspicious") fill(255, 230, 150);
    else fill(255);
    ellipse(x - eyeDistance / 2, y, eSize, eSize * 0.7);
    ellipse(x + eyeDistance / 2, y, eSize, eSize * 0.7);
    fill(20);
    ellipse(x - eyeDistance / 2 + offsetX, y, pSize, pSize);
    ellipse(x + eyeDistance / 2 + offsetX, y, pSize, pSize);
    if (state !== "normal") {
      stroke(120); strokeWeight(eSize * 0.12);
      line(x - eyeDistance/2 - eSize/2, y - eSize/2, x - eyeDistance/2 + eSize/4, y - eSize/4);
      line(x + eyeDistance/2 + eSize/2, y - eSize/2, x + eyeDistance/2 - eSize/4, y - eSize/4);
    }
    pop();
  }

  function drawSoundBar(x, y, vol) {
    let barMaxWidth = 200;
    let barThickness = 20;
    let currentWidth = map(vol, 0, 0.1, 0, barMaxWidth);
    currentWidth = constrain(currentWidth, 0, barMaxWidth);
    push();
    rectMode(CENTER);
    noFill(); stroke(100); strokeWeight(2);
    rect(x, y, barMaxWidth, barThickness, 5);
    fill(vol > threshold ? color(255, 0, 0) : (inDangerZone ? color(255, 200, 0) : color(0, 255, 100)));
    rectMode(CORNER); noStroke();
    rect(x - barMaxWidth/2, y - barThickness/2, currentWidth, barThickness, 5);
    pop();
  }

  function drawGameOver() {
    background(0); textAlign(CENTER, CENTER);
    fill(255, 0, 0); textSize(100); text("TERMINATED", width/2, height/2);
    fill(255); textSize(30); text("CLICK TO REBOOT", width/2, height/2 + 100);
  }

  function mousePressed() {
    userStartAudio(); 
    if (isDead) { strikes = 0; inDangerZone = false; isDead = false; mainTimer = 1*60; timeIsUp = false; }
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    rectX = width / 2; rectY = height / 2;
  }

</script>
</body></html>
